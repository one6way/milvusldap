apiVersion: v1
kind: ConfigMap
metadata:
  name: milvus-ldap-gateway-envoy
  namespace: milvus
  labels:
    app.kubernetes.io/name: milvus-ldap-gateway
    app.kubernetes.io/component: ldap-gateway
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901
    static_resources:
      listeners:
        - name: milvus_ldap_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 19530
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: milvus_ldap_ingress
                    codec_type: AUTO
                    route_config:
                      name: milvus_route
                      virtual_hosts:
                        - name: milvus
                          domains: ["*"]
                          routes:
                            # ТЗ ИБ: /api/v1/user/info — без форка Milvus, отдаёт milvus-ldap-auth
                            - match:
                                path: "/api/v1/user/info"
                              route:
                                cluster: ldap_auth_extauthz
                                timeout: 15s
                              typed_per_filter_config:
                                envoy.filters.http.ext_authz:
                                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                                  disabled: true
                            - match:
                                path: "/user/info"
                              route:
                                cluster: ldap_auth_extauthz
                                timeout: 15s
                              typed_per_filter_config:
                                envoy.filters.http.ext_authz:
                                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                                  disabled: true
                            - match:
                                prefix: "/"
                              route:
                                cluster: milvus_upstream
                                timeout: 0s
                    http_filters:
                      - name: envoy.filters.http.ext_authz
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                          transport_api_version: V3
                          failure_mode_allow: false
                          http_service:
                            server_uri:
                              uri: http://ldap-auth-extauthz:8080
                              cluster: ldap_auth_extauthz
                              timeout: 5s
                            authorization_request:
                              allowed_headers:
                                patterns:
                                  - exact: authorization
                            authorization_response:
                              allowed_upstream_headers:
                                patterns:
                                  - exact: authorization
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: milvus_upstream
          connect_timeout: 5s
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          http2_protocol_options: {}
          load_assignment:
            cluster_name: milvus_upstream
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: milvus
                          port_value: 19530
        - name: ldap_auth_extauthz
          connect_timeout: 2s
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: ldap_auth_extauthz
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: ldap-auth-extauthz
                          port_value: 8080
