apiVersion: apps/v1
kind: Deployment
metadata:
  name: openldap-lab
  namespace: milvus
  labels:
    app.kubernetes.io/name: openldap-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openldap-lab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openldap-lab
    spec:
      containers:
        - name: openldap
          image: osixia/openldap:1.5.0
          imagePullPolicy: IfNotPresent
          env:
            - name: LDAP_ORGANISATION
              value: MilvusLab
            - name: LDAP_DOMAIN
              value: lab.local
            - name: LDAP_ADMIN_PASSWORD
              value: **********
            - name: LDAP_TLS
              value: "false"
          ports:
            - name: ldap
              containerPort: 389
          readinessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: openldap-lab
  namespace: milvus
  labels:
    app.kubernetes.io/name: openldap-lab
spec:
  selector:
    app.kubernetes.io/name: openldap-lab
  ports:
    - name: ldap
      port: 389
      targetPort: 389
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openldap-lab-seed
  namespace: milvus
data:
  seed.ldif: |
    dn: ou=users,dc=lab,dc=local
    objectClass: organizationalUnit
    ou: users

    dn: ou=groups,dc=lab,dc=local
    objectClass: organizationalUnit
    ou: groups

    dn: cn=testuser,ou=users,dc=lab,dc=local
    objectClass: inetOrgPerson
    cn: testuser
    sn: Testuser
    uid: testuser
    userPassword: **********

    dn: cn=milvus655,ou=users,dc=lab,dc=local
    objectClass: inetOrgPerson
    cn: milvus655
    sn: Milvus655
    uid: milvus655
    userPassword: **********

    dn: cn=g-milvus-read,ou=groups,dc=lab,dc=local
    objectClass: groupOfNames
    cn: g-milvus-read
    member: cn=testuser,ou=users,dc=lab,dc=local
    member: cn=milvus655,ou=users,dc=lab,dc=local
---
apiVersion: batch/v1
kind: Job
metadata:
  name: openldap-lab-seed
  namespace: milvus
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: osixia/openldap:1.5.0
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -ec
            - |
              for i in $(seq 1 60); do
                ldapsearch -x -H ldap://openldap-lab:389 -b dc=lab,dc=local -D "cn=admin,dc=lab,dc=local" -w ********** '(objectClass=*)' dn >/dev/null 2>&1 && break
                sleep 2
              done
              ldapadd -x -H ldap://openldap-lab:389 -D "cn=admin,dc=lab,dc=local" -w ********** -f /seed/seed.ldif
              echo "LDAP seed OK"
          volumeMounts:
            - name: seed
              mountPath: /seed
              readOnly: true
      volumes:
        - name: seed
          configMap:
            name: openldap-lab-seed
