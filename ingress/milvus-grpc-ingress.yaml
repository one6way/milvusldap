# Milvus gRPC Ingress — порт Service 19530
# Документация: https://milvus.io/docs/v2.5.x/ingress.md
#
# Заменить плейсхолдеры {{ ... }} перед apply.
# pymilvus: connections.connect("default", uri="https://{{ MILVUS_GRPC_HOST }}:443")
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: milvus-grpc
  namespace: {{ NAMESPACE }}
  labels:
    app.kubernetes.io/name: milvus
    app.kubernetes.io/component: grpc
  annotations:
    # Как в официальном ingress.yaml Milvus
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: GRPC
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-body-size: "2048m"
    # cert-manager (раскомментировать при автовыпуске сертификата):
    # cert-manager.io/cluster-issuer: {{ CERT_MANAGER_CLUSTER_ISSUER }}
spec:
  ingressClassName: {{ INGRESS_CLASS }}
  tls:
    - hosts:
        - {{ MILVUS_GRPC_HOST }}
      secretName: {{ TLS_SECRET_NAME }}
  rules:
    - host: {{ MILVUS_GRPC_HOST }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ MILVUS_SERVICE_NAME }}
                port:
                  number: 19530
