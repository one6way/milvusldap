cluster:
  enabled: true

standalone:
  enabled: false

global:
  imagePullPolicy: IfNotPresent

image:
  all:
    repository: milvus-nonroot
    tag: "2.5.0"
    pullPolicy: IfNotPresent

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false

etcd:
  image:
    repository: milvus-etcd-nonroot
    tag: "3.5.16-r1"
    pullPolicy: IfNotPresent
  replicaCount: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 8Gi

minio:
  image:
    repository: milvus-minio-nonroot
    tag: "RELEASE.2023-03-20T20-16-18Z"
    pullPolicy: IfNotPresent
  mode: standalone
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 20Gi

pulsarv3:
  enabled: true
  images:
    zookeeper:
      repository: milvus-pulsar-nonroot
      tag: "3.0.7"
      pullPolicy: IfNotPresent
    bookie:
      repository: milvus-pulsar-nonroot
      tag: "3.0.7"
      pullPolicy: IfNotPresent
    autorecovery:
      repository: milvus-pulsar-nonroot
      tag: "3.0.7"
      pullPolicy: IfNotPresent
    broker:
      repository: milvus-pulsar-nonroot
      tag: "3.0.7"
      pullPolicy: IfNotPresent
    proxy:
      repository: milvus-pulsar-nonroot
      tag: "3.0.7"
      pullPolicy: IfNotPresent
  zookeeper:
    replicaCount: 1
  bookkeeper:
    replicaCount: 3
  broker:
    replicaCount: 1
  autorecovery:
    replicaCount: 1
  proxy:
    replicaCount: 1

proxy:
  replicas: 1
rootCoord:
  replicas: 1
queryCoord:
  replicas: 1
dataCoord:
  replicas: 1
indexCoord:
  replicas: 1
queryNode:
  replicas: 1
dataNode:
  replicas: 1
indexNode:
  replicas: 1

auth:
  keycloak:
    enabled: true
    mode: gateway
    gateway:
      image:
        repository: envoyproxy/envoy
        tag: v1.31.2
        pullPolicy: IfNotPresent
      replicas: 1
      service:
        type: ClusterIP
        port: 19530
      resources: {}
    oidc:
      issuer: "https://keycloak.example.local/realms/milvus"
      audience: "milvus-client"
      jwksUri: "https://keycloak.example.local/realms/milvus/protocol/openid-connect/certs"
      jwksHost: "keycloak.example.local"
      jwksPort: 443
