cluster:
  enabled: true

standalone:
  enabled: false

global:
  imagePullPolicy: IfNotPresent
  # Uncomment for private registry usage.
  # imageRegistry: "{{ INTERNAL_REGISTRY }}"
  # imagePullSecrets:
  #   - internal-registry-secret

image:
  all:
    repository: milvus-nonroot
    tag: "2.5.0"
    pullPolicy: IfNotPresent

# Security baseline for all Milvus pods.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false

# Internal etcd for MVP prod (can be switched to external later).
etcd:
  enabled: true
  image:
    repository: milvus-etcd-nonroot
    tag: "3.5.16-r1"
    pullPolicy: IfNotPresent
  replicaCount: 3
  persistence:
    enabled: true
    storageClass: local-path
    size: 100Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

# Internal MinIO for MVP prod. If you already have enterprise S3,
# disable minio and configure externalS3.
minio:
  enabled: true
  image:
    repository: milvus-minio-nonroot
    tag: "RELEASE.2023-03-20T20-16-18Z"
    pullPolicy: IfNotPresent
  mode: standalone
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 500Gi
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

# Keep Pulsar internal for Milvus event pipeline.
pulsarv3:
  enabled: true
  images:
    zookeeper:
      repository: milvus-pulsar-nonroot
      tag: "3.0.7"
      pullPolicy: IfNotPresent
    bookie:
      repository: milvus-pulsar-nonroot
      tag: "3.0.7"
      pullPolicy: IfNotPresent
    autorecovery:
      repository: milvus-pulsar-nonroot
      tag: "3.0.7"
      pullPolicy: IfNotPresent
    broker:
      repository: milvus-pulsar-nonroot
      tag: "3.0.7"
      pullPolicy: IfNotPresent
    proxy:
      repository: milvus-pulsar-nonroot
      tag: "3.0.7"
      pullPolicy: IfNotPresent
  zookeeper:
    replicaCount: 3
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 2Gi
  bookkeeper:
    replicaCount: 3
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "4"
        memory: 4Gi
  broker:
    replicaCount: 2
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 2Gi
  autorecovery:
    replicaCount: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  proxy:
    replicaCount: 2
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

# Milvus core (balanced MVP profile for production pilot).
proxy:
  replicas: 2
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

mixCoordinator:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

queryNode:
  replicas: 2
  resources:
    requests:
      cpu: "2"
      memory: 8Gi
    limits:
      cpu: "4"
      memory: 16Gi

dataNode:
  replicas: 2
  resources:
    requests:
      cpu: "2"
      memory: 8Gi
    limits:
      cpu: "4"
      memory: 16Gi

indexNode:
  replicas: 2
  resources:
    requests:
      cpu: "2"
      memory: 8Gi
    limits:
      cpu: "4"
      memory: 16Gi

# Keycloak gateway remains optional.
auth:
  keycloak:
    enabled: false
    mode: gateway
    gateway:
      image:
        repository: envoyproxy/envoy
        tag: v1.31.2
        pullPolicy: IfNotPresent
      replicas: 2
      service:
        type: ClusterIP
        port: 19530
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
    oidc:
      issuer: "https://{{ KEYCLOAK_HOST }}/realms/{{ REALM }}"
      audience: "{{ MILVUS_CLIENT_ID }}"
      jwksUri: "https://{{ KEYCLOAK_HOST }}/realms/{{ REALM }}/protocol/openid-connect/certs"
      jwksHost: "{{ KEYCLOAK_HOST }}"
      jwksPort: 443
