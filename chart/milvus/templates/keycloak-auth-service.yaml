{{- if .Values.auth.keycloak.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "milvus.fullname" . }}-auth-gateway
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "milvus.labels" . | indent 4 }}
    component: "auth-gateway"
spec:
  type: {{ .Values.auth.keycloak.gateway.service.type }}
  ports:
  - name: grpc
    port: {{ .Values.auth.keycloak.gateway.service.port }}
    targetPort: grpc
    protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "milvus.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: "auth-gateway"
{{- end }}
